server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /config.js {
    add_header Cache-Control "no-store";
  }

  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
